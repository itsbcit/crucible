---
image_name:
base_labels:
  maintainer: '<%= maintainer %>'
  build_id: '<%= build_id %>'
labels: {}
maintainer:
registries: []
build: true
build_platform: 'linux/amd64'
test: true
tag: true
tag_build_id: true
push: true
test_command:
base_tags:
  - '<%= tag_join(version, variant) %>'
  - '<%= tag_build_id ? tag_join(version, variant, build_suffix) : nil %>'
tags:
  - '<%= tag_join(version, variant, "latest") %>'
template_files: []
variants:
  '': {}
base_vars:
  catatonit_version: '0.2.1'
  tini_version: '0.19.0'
  ce_version: '1.0'
  dockerize_version: '0.6.1'
vars: {}
versions:
  '': {}
